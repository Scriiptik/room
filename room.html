<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTogether — Комната</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-2: #1f1f23;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --text-dim: #52525b;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --green: #22c55e;
            --red: #ef4444;
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ===== Шапка ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 0.75rem; }
        .btn-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; background: var(--surface);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-muted); cursor: pointer; font-size: 1.1rem;
            transition: background 0.2s, color 0.2s;
        }
        .btn-icon:hover { background: var(--surface-2); color: var(--text); }

        /* Кнопка "Найти что-то" */
        .btn-find {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 0.85rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-find:hover { border-color: var(--accent); color: var(--text); background: var(--surface-2); }

        /* Модальная панель */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem; width: 90%; max-width: 400px;
            position: relative;
        }
        .modal-close {
            position: absolute; top: 0.75rem; right: 0.75rem;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            background: var(--surface-2); border: none; border-radius: 6px;
            color: var(--text-muted); cursor: pointer; font-size: 1.2rem;
        }
        .modal-close:hover { background: var(--border); color: var(--text); }

        .modal-title {
            font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text);
        }

        .service-btn {
            width: 100%; padding: 1rem; margin-bottom: 0.75rem;
            display: flex; align-items: center; gap: 0.75rem;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s;
            font-family: inherit; color: var(--text);
        }
        .service-btn:hover { border-color: var(--accent); background: var(--surface); }
        .service-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .service-icon {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .service-icon.vk { background: #0077FF; }
        .service-icon.youtube { background: #FF0000; }

        .service-info { flex: 1; text-align: left; }
        .service-name { font-weight: 600; font-size: 0.95rem; }
        .service-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }

        .room-badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.4rem 0.75rem; background: var(--surface);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em;
            cursor: pointer; transition: border-color 0.2s;
        }
        .room-badge:hover { border-color: var(--accent); }
        .room-badge .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; }

        .user-badge { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--text-muted); }
        .user-avatar {
            width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent), #3b82f6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; color: #fff;
        }

        /* ===== Основной контейнер ===== */
        .main {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== Левая панель — участники ===== */
        .participants-panel {
            width: 200px;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 80px;
            align-self: flex-start;
        }
        .panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .member {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.6rem; border-radius: 8px;
            font-size: 0.85rem;
        }
        .member:hover { background: var(--surface-2); }
        .member-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; }

        /* ===== Центральная колонка — видео и ввод ===== */
        .center-col {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .video-bar {
            display: flex;
            gap: 0.5rem;
        }
        .video-bar .input {
            flex: 1;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .video-bar .input::placeholder { color: var(--text-dim); }
        .video-bar .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-accent {
            padding: 0.7rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3); }
        .btn-accent:active { transform: translateY(0); }
        .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Плеер */
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        .player-wrapper video { width: 100%; height: 100%; display: block; }
        .player-wrapper > div { width: 100%; height: 100%; }
        .plyr { --plyr-color-main: var(--accent); height: 100%; }
        .plyr__video-wrapper { background: #000; }

        /* ===== Правая панель — чат ===== */
        .chat-panel {
            width: 320px;
            flex-shrink: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 120px);
            position: sticky;
            top: 80px;
            align-self: flex-start;
        }
        .chat-head {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-height: 0;
        }
        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
            padding: 0.5rem 0.75rem;
            background: var(--surface-2);
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
            flex-shrink: 0;
        }
        .msg .u { color: var(--accent); font-weight: 600; margin-right: 0.35rem; }
        .msg .t { color: var(--text-muted); }
        .msg .time { color: var(--text-dim); font-size: 0.7rem; margin-left: 0.4rem; }
        .msg.sys {
            background: transparent;
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.8rem;
        }

        .chat-foot {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 0.75rem;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .chat-foot .input {
            flex: 1;
            padding: 0.55rem 0.75rem;
            font-size: 0.85rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-foot .input::placeholder { color: var(--text-dim); }
        .chat-foot .input:focus { border-color: var(--accent); }

        .btn-send {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent);
            border: none; border-radius: 8px;
            color: #fff; cursor: pointer;
            font-size: 1rem; transition: background 0.2s;
        }
        .btn-send:hover { background: var(--accent-hover); }

        /* Тост */
        .toast {
            position: fixed;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--red);
            color: #fff;
            padding: 0.65rem 1.25rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* Режим кинотеатра */
        body.cinema-mode .header { display: none; }
        body.cinema-mode .participants-panel { display: none; }
        body.cinema-mode .chat-panel { 
            max-height: 200px;
            border-radius: 0;
        }
        body.cinema-mode .main {
            padding: 0;
            gap: 0;
        }
        body.cinema-mode .center-col {
            display: flex;
            flex-direction: column;
        }
        body.cinema-mode .player-wrapper {
            border-radius: 0;
            flex: 1;
        }
        body.cinema-mode .video-bar { display: none; }

        /* Кнопка выхода из кинорежима */
        .cinema-exit {
            position: fixed; top: 1rem; right: 1rem;
            width: 40px; height: 40px;
            background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
            color: #fff; font-size: 1.5rem; cursor: pointer;
            z-index: 500; display: none;
            align-items: center; justify-content: center;
        }
        body.cinema-mode .cinema-exit { display: flex; }

        /* Адаптация при открытии клавиатуры */
        body.keyboard-open .main {
            max-height: calc(100vh - var(--keyboard-height, 200px));
        }
        body.keyboard-open .chat-panel {
            max-height: calc(30vh - var(--keyboard-height, 200px) / 2);
        }
        body.keyboard-open .chat-body {
            flex: 1;
            min-height: 0;
        }

        /* Адаптивность */
        @media (max-width: 900px) {
            .main { flex-wrap: wrap; }
            .participants-panel { width: 100%; max-height: 150px; position: static; }
            .chat-panel { width: 100%; max-height: 300px; position: static; }
        }
        @media (max-width: 768px) {
            .main { padding: 0.75rem; }
            .video-bar { flex-direction: column; }
            .btn-accent { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="header-left">
            <button id="backBtn" class="btn-icon" title="На главную">←</button>
            <div class="room-badge" id="roomIdDisplay" title="Нажмите, чтобы скопировать">
                <span class="dot"></span>
                <span id="roomIdText"></span>
            </div>
            <button id="findBtn" class="btn-find" title="Найти видео">🔍 Найти что-то</button>
        </div>
        <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <span id="nicknameDisplay"></span>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main">
        <!-- Левая панель: участники -->
        <div class="participants-panel">
            <div class="panel-header">👥 Участники</div>
            <div id="participantsList" class="panel-body"></div>
        </div>

        <!-- Центральная колонка: ввод + видео -->
        <div class="center-col">
            <form id="videoForm" class="video-bar">
                <input type="text" id="videoUrlInput" class="input" placeholder="YouTube, Vimeo, VK или iframe код для встраивания" required autocomplete="off">
                <button type="submit" id="loadBtn" class="btn-accent">▶ Загрузить</button>
            </form>

            <div class="player-wrapper">
                <div id="playerEmbed" style="display:none;"></div>
                <video id="player" playsinline controls></video>
            </div>
        </div>

        <!-- Правая панель: чат -->
        <div class="chat-panel">
            <div class="chat-head">💬 Чат</div>
            <div id="chatMessages" class="chat-body"></div>
            <form id="chatForm" class="chat-foot">
                <input type="text" id="chatInput" class="input" placeholder="Написать сообщение..." maxlength="500" required autocomplete="off">
                <button type="submit" class="btn-send">➤</button>
            </form>
        </div>
    </div>

    <!-- Тост -->
    <div id="errorToast" class="toast"></div>

    <!-- Кнопка выхода из кинорежима -->
    <button id="cinemaExit" class="cinema-exit" title="Выйти из режима кинотеатра">×</button>

    <!-- Модальная панель для выбора сервиса -->
    <div id="findModal" class="modal-overlay">
        <div class="modal-panel">
            <button id="modalClose" class="modal-close" title="Закрыть">×</button>
            <div class="modal-title">🔍 Найти видео</div>
            
            <button id="openVK" class="service-btn">
                <div class="service-icon vk">📹</div>
                <div class="service-info">
                    <div class="service-name">VK Видео</div>
                    <div class="service-desc">Открыть VK (ПК версия)</div>
                </div>
            </button>
            
            <button id="openYouTube" class="service-btn">
                <div class="service-icon youtube">▶️</div>
                <div class="service-info">
                    <div class="service-name">YouTube</div>
                    <div class="service-desc">Открыть YouTube</div>
                </div>
            </button>
            
            <button id="openHelp" class="service-btn">
                <div class="service-icon" style="background: #22c55e;">📖</div>
                <div class="service-info">
                    <div class="service-name">Справка</div>
                    <div class="service-desc">Как добавить видео</div>
                </div>
            </button>
        </div>
    </div>

    <!-- Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <!-- Firebase SDK -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
        }
    }
    </script>

    <script type="module">
        // ===== ВАШ ПОЛНЫЙ НЕИЗМЕНЁННЫЙ JAVASCRIPT КОД =====
        // (Вставлен из вашего предыдущего файла для полноты)
        // ============================================================

        import { initializeApp } from 'firebase/app';
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            onSnapshot,
            updateDoc,
            arrayUnion,
            serverTimestamp,
            deleteField
        } from 'firebase/firestore';

        // Конфигурация Firebase проекта room-4ac0b
        const firebaseConfig = {
            apiKey: "AIzaSyAPAuJUcd9_YWWvVAqiWOtlllV0An0bD18",
            authDomain: "room-4ac0b.firebaseapp.com",
            projectId: "room-4ac0b",
            storageBucket: "room-4ac0b.firebasestorage.app",
            messagingSenderId: "727563793446",
            appId: "1:727563793446:web:92b086d004d684c9f662e7",
            measurementId: "G-SPNKBKPHH1"
        };

        // Инициализация Firebase
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log('Firebase инициализирован успешно');
        } catch (e) {
            console.error('Ошибка инициализации Firebase:', e);
        }

        // ============================================================
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        // ============================================================

        // Получаем ID комнаты из URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');

        // Ник пользователя (из localStorage или "Гость")
        const nickname = localStorage.getItem('watchtogether_nickname') || 'Гость';

        // Уникальный ID пользователя для отслеживания присутствия
        const userId = Math.random().toString(36).substring(2, 10);

        // Ссылка на документ комнаты в Firestore
        const roomRef = doc(db, 'rooms', roomId);

        // Плеер Plyr
        let player = null;

        // Флаг: игнорировать следующее обновление состояния (чтобы избежать петель)
        let ignoreNextUpdate = false;

        // Время последней локальной синхронизации
        let lastSyncTime = 0;

        // Последний загруженный URL видео (для предотвращения повторной загрузки)
        let lastLoadedVideoUrl = '';

        // Время, до которого игнорируем синхронизацию (после загрузки видео)
        let blockSyncUntil = 0;

        // Время последней локальной записи в Firestore (чтобы не реагировать на свои записи)
        let lastLocalUpdate = 0;

        // Web Audio API для звуков
        let audioCtx = null;
        let audioCtxInitialized = false;

        function ensureAudioCtx() {
            if (!audioCtxInitialized) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioCtxInitialized = true;
                } catch (e) {
                    console.warn('Web Audio API не доступен:', e);
                }
            }
            return audioCtx;
        }

        function playSendSound() {
            const ctx = ensureAudioCtx();
            if (!ctx) return;
            
            try {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
                osc.start();
                osc.stop(ctx.currentTime + 0.08);
            } catch (e) {
                console.warn('Ошибка воспроизления звука отправки:', e);
            }
        }

        function playReceiveSound() {
            const ctx = ensureAudioCtx();
            if (!ctx) return;
            
            try {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 700;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {
                console.warn('Ошибка воспроизления звука получения:', e);
            }
        }

        // ============================================================
        // ===== ЭЛЕМЕНТЫ DOM =====
        // ============================================================

        const backBtn = document.getElementById('backBtn');
        const roomIdText = document.getElementById('roomIdText');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const userAvatar = document.getElementById('userAvatar');
        const videoForm = document.getElementById('videoForm');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadBtn = document.getElementById('loadBtn');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const participantsList = document.getElementById('participantsList');
        const errorToast = document.getElementById('errorToast');
        
        // Элементы модальной панели
        const findBtn = document.getElementById('findBtn');
        const findModal = document.getElementById('findModal');
        const modalClose = document.getElementById('modalClose');
        const openVK = document.getElementById('openVK');
        const openYouTube = document.getElementById('openYouTube');
        const openHelp = document.getElementById('openHelp');

        // Конвертировать URL в VK desktop версию
        function convertToVKDesktopUrl(url) {
            // Если это уже video_ext.php, возвращаем как есть (это работает везде)
            if (url.includes('video_ext.php')) {
                return url;
            }
            
            // Если это VK ссылка с video-OWNER_ID, конвертируем в video_ext.php
            const vkIdMatch = url.match(/vk\.com\/.*video-?(\d+)_(\d+)/);
            if (vkIdMatch) {
                const ownerId = vkIdMatch[1];
                const videoId = vkIdMatch[2];
                return `https://vk.com/video_ext.php?oid=-${ownerId}&id=${videoId}&hd=2`;
            }
            
            // Если это уже VK ссылка, возвращаем как есть
            return url;
        }

        // Конвертировать URL в YouTube
        function convertToYouTubeUrl(url) {
            const videoId = extractYouTubeId(url);
            if (videoId) {
                return `https://www.youtube.com/watch?v=${videoId}`;
            }
            return url;
        }

        // ============================================================
        // ===== ОБНОВЛЕНИЕ СОСТОЯНИЯ В FIREBASE =====
        // ============================================================

        /**
         * Обновляет состояние плеера в Firestore.
         * @param {boolean} isPlaying - Воспроизводится ли видео
         */
        async function updatePlayerState(isPlaying) {
            if (!player) return;
            if (typeof player.duration !== 'number') return;
            try {
                await updateDoc(roomRef, {
                    playerState: {
                        isPlaying: isPlaying,
                        currentTime: player.currentTime || 0,
                        timestamp: Date.now()
                    }
                });
                lastLocalUpdate = Date.now();
            } catch (error) {
                console.error('Ошибка обновления состояния:', error);
            }
        }

        // ============================================================
        // ===== ПОДПИСКА НА ОБНОВЛЕНИЯ КОМНАТЫ =====
        // ============================================================

        function subscribeToRoom() {
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) {
                    showError('Комната не найдена.');
                    return;
                }

                const data = docSnap.data();

                // Обновляем список участников
                updateParticipants(data.participants || {});

                // Обновляем сообщения чата
                updateChat(data.messages || []);

                // Синхронизируем состояние плеера
                syncPlayerState(data.playerState);

                // Обновляем видео, если URL изменился (сравниваем с lastLoadedVideoUrl)
                if (data.videoUrl && data.videoUrl !== lastLoadedVideoUrl) {
                    loadVideo(data.videoUrl, true); // fromSync = true
                }
            }, (error) => {
                console.error('Ошибка подписки:', error);
                showError('Ошибка синхронизации с комнатой.');
            });
        }

        // ============================================================
        // ===== СИНХРОНИЗАЦИЯ ПЛЕЕРА =====
        // ============================================================

        /**
         * Синхронизирует локальный плеер с состоянием из Firestore.
         * Избегает петель синхронизации.
         */
        function syncPlayerState(playerState) {
            if (!playerState || !player) return;
            if (Date.now() < blockSyncUntil) return;

            const { isPlaying, currentTime, timestamp } = playerState;
            const now = Date.now();

            // Не реагируем на свои свежие записи (< 2 сек назад)
            if (now - lastLocalUpdate < 2000) return;

            if (now - timestamp > 8000) return;
            if (now - lastSyncTime < 1500) return;
            if (!player.duration || player.duration <= 0) return;

            // Перемотка
            const timeDiff = Math.abs(player.currentTime - currentTime);
            if (timeDiff > 2.0) {
                ignoreNextUpdate = true;
                player.currentTime = currentTime;
            }

            // Play
            if (isPlaying && !player.playing) {
                ignoreNextUpdate = true;
                const playPromise = player.play();
                if (playPromise && typeof playPromise.catch === 'function') {
                    playPromise.catch(() => {});
                }
            }
            // Pause
            else if (!isPlaying && player.playing) {
                ignoreNextUpdate = true;
                player.pause();
            }

            lastSyncTime = now;
        }

        // ============================================================
        // ===== ЗАГРУЗКА ВИДЕО =====
        // ============================================================

        /**
         * Определяет тип видео по URL.
         * @param {string} url - Ссылка на видео
         * @returns {string} 'youtube', 'vimeo', 'vk', 'mp4' или null
         */
        function detectVideoType(url) {
            if (!url) return null;

            // YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                return 'youtube';
            }

            // Vimeo
            if (url.includes('vimeo.com')) {
                return 'vimeo';
            }

            // VK (поддерживаем vk.com, vkvideo.ru, video_ext.php)
            if (url.includes('vk.com') || url.includes('vkvideo.ru') || 
                url.includes('video_ext.php')) {
                return 'vk';
            }

            // Прямая ссылка на MP4
            if (url.includes('.mp4') || url.includes('.m4v')) {
                return 'mp4';
            }

            // Если ссылка не распознана, пробуем как MP4
            return 'mp4';
        }

        /**
         * Загружает видео в плеер и обновляет Firestore.
         * @param {string} url - Ссылка на видео
         * @param {boolean} fromSync - Если true, не обновлять Firestore (загрузка из подписки)
         */
        async function loadVideo(url, fromSync = false) {
            const type = detectVideoType(url);

            if (!type) {
                showError('Неподдерживаемый формат видео.');
                return;
            }

            try {
                lastLoadedVideoUrl = url;

                const videoEl = document.getElementById('player');
                const embedEl = document.getElementById('playerEmbed');

                // Проверяем что DOM элементы существуют
                if (!videoEl || !embedEl) {
                    showError('Ошибка: элементы плеера не найдены.');
                    return;
                }

                // Уничтожаем старый Plyr
                if (player) {
                    player.destroy();
                    player = null;
                }

                // Полностью скрываем оба контейнера перед переключением
                videoEl.style.display = 'none';
                embedEl.style.display = 'none';
                embedEl.innerHTML = '';

                // Находим и скрываем все Plyr-обёртки
                document.querySelectorAll('.plyr').forEach(el => {
                    el.style.display = 'none';
                });

                if (type === 'youtube') {
                    const videoId = extractYouTubeId(url);
                    if (!videoId) {
                        showError('Неверная ссылка на YouTube.');
                        return;
                    }

                    // Показываем embed контейнер
                    embedEl.style.display = 'block';

                    // Создаём контейнер с правильными data-атрибутами
                    const div = document.createElement('div');
                    div.setAttribute('data-plyr-provider', 'youtube');
                    div.setAttribute('data-plyr-embed-id', videoId);
                    embedEl.appendChild(div);

                    player = new Plyr(div, {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed'],
                        youtube: {
                            noCookie: true,
                            rel: 0,
                            showinfo: 0,
                            iv_load_policy: 3,
                            modestbranding: 1,
                            playsinline: 1
                        }
                    });

                    // Обработка ошибок YouTube
                    player.on('error', (e) => {
                        console.error('YouTube ошибка:', e);
                        showError('Видео недоступно для встраивания. Попробуйте MP4 ссылку.');
                    });

                    // Таймаут на случай, если видео не загружается
                    setTimeout(() => {
                        if (player && player.duration === 0) {
                            showError('Видео заблокировано для встраивания. Попробуйте другое или используйте MP4.');
                        }
                    }, 10000);

                    setupPlayerHandlers();
                    blockSyncUntil = Date.now() + 3000;

                } else if (type === 'vimeo') {
                    const videoId = extractVimeoId(url);
                    if (!videoId) {
                        showError('Неверная ссылка на Vimeo.');
                        return;
                    }

                    // Показываем embed контейнер
                    embedEl.style.display = 'block';

                    const div = document.createElement('div');
                    div.setAttribute('data-plyr-provider', 'vimeo');
                    div.setAttribute('data-plyr-embed-id', videoId);
                    embedEl.appendChild(div);

                    player = new Plyr(div, {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed']
                    });

                    setupPlayerHandlers();
                    blockSyncUntil = Date.now() + 3000;

                } else if (type === 'vk') {
                    const embedUrl = convertVKToEmbedUrl(url);
                    if (!embedUrl) {
                        showError('Неверная ссылка на VK видео.');
                        return;
                    }

                    // Показываем embed контейнер
                    embedEl.style.display = 'block';

                    // Создаём iframe для VK видео
                    const iframe = document.createElement('iframe');
                    iframe.src = embedUrl;
                    iframe.setAttribute('frameborder', '0');
                    iframe.setAttribute('allowfullscreen', 'true');
                    iframe.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
                    iframe.style.width = '100%';
                    iframe.style.height = '100%';
                    embedEl.appendChild(iframe);

                    // Для VK не используем Plyr, а просто показываем iframe
                    // Создаём простой интерфейс управления
                    setupVKPlayerHandlers(iframe);
                    blockSyncUntil = Date.now() + 3000;

                    // Автоматически начинаем воспроизведение (насколько возможно с iframe)
                    setTimeout(() => {
                        console.log('VK видео загружено, пытаемся запустить...');
                    }, 1000);

                } else if (type === 'mp4') {
                    // Показываем video элемент
                    videoEl.style.display = 'block';

                    player = new Plyr('#player', {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed'],
                        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                    });

                    player.source = {
                        type: 'video',
                        sources: [{
                            src: url,
                            type: 'video/mp4'
                        }]
                    };

                    setupPlayerHandlers();

                    // Автоматически запускаем видео
                    player.on('canplay', () => {
                        const playPromise = player.play();
                        if (playPromise && typeof playPromise.catch === 'function') {
                            playPromise.catch(() => {
                                console.log('Автозапуск заблокирован браузером');
                            });
                        }
                    });
                }

                // Обновляем Firestore только если это не загрузка из подписки
                if (!fromSync) {
                    await updateDoc(roomRef, {
                        videoUrl: url,
                        playerState: {
                            isPlaying: false,
                            currentTime: 0,
                            timestamp: Date.now()
                        },
                        messages: arrayUnion({
                            system: true,
                            text: `${nickname} загрузил новое видео.`,
                            timestamp: Date.now()
                        })
                    });
                }

                console.log('Видео загружено:', url, 'тип:', type, fromSync ? '(синхронизация)' : '');

            } catch (error) {
                console.error('Ошибка загрузки видео:', error);
                if (error.code === 'unavailable') {
                    showError('Нет подключения к Firebase. Проверьте интернет.');
                } else {
                    showError('Ошибка загрузки видео: ' + error.message);
                }
            }
        }

        /**
         * Подписывает обработчики событий плеера.
         */
        function setupPlayerHandlers() {
            if (!player) return;

            player.on('play', () => {
                if (ignoreNextUpdate) { ignoreNextUpdate = false; return; }
                updatePlayerState(true);
            });

            player.on('pause', () => {
                if (ignoreNextUpdate) { ignoreNextUpdate = false; return; }
                updatePlayerState(false);
            });

            player.on('seeked', () => {
                if (ignoreNextUpdate) { ignoreNextUpdate = false; return; }
                updatePlayerState(player.playing);
            });

            player.on('error', (error) => {
                console.error('Ошибка плеера:', error);
                showError('Не удалось загрузить видео. Проверьте ссылку.');
            });

            player.on('ready', () => {
                console.log('Плеер готов');
            });

            player.on('loadedmetadata', () => {
                console.log('Метаданные видео загружены, длительность:', player.duration);
            });

            player.on('canplay', () => {
                console.log('Видео готово к воспроизведению');
            });
        }

        /**
         * Обработчики для VK iframe (ограниченная поддержка).
         * VK iframe не предоставляет API для синхронизации, поэтому только базовая поддержка.
         */
        function setupVKPlayerHandlers(iframe) {
            console.log('VK видео загружено в iframe');
            // VK iframe не даёт API для управления, поэтому просто логируем
            // Синхронизация невозможна с iframe VK, пользователь управляет самостоятельно
        }

        /**
         * Извлекает ID видео из YouTube URL.
         */
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        /**
         * Извлекает ID видео из Vimeo URL.
         */
        function extractVimeoId(url) {
            const regExp = /vimeo.com\/(\d+)/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        /**
         * Извлекает ID видео из VK URL.
         */
        function extractVKId(url) {
            // Поддерживаем форматы:
            // vk.com/video-OWNER_ID_VIDEO_ID
            // vk.com/video?z=video-OWNER_ID_VIDEO_ID
            // vk.com/clip-OWNER_ID_CLIP_ID
            // vkvideo.ru/video_ext.php?oid=...&id=...&hash=...
            // Прямые ссылки video_ext.php
            
            // Для video_ext.php извлекаем параметры напрямую
            if (url.includes('video_ext.php')) {
                const params = new URLSearchParams(url.split('?')[1]);
                return {
                    ownerId: params.get('oid'),
                    videoId: params.get('id'),
                    hash: params.get('hash')
                };
            }
            
            const patterns = [
                /vk\.com\/.*video-?(\d+)_(\d+)/,
                /vk\.com\/.*\?z=video-?(\d+)_(\d+)/,
                /vk\.com\/.*clip-?(\d+)_(\d+)/
            ];
            
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) {
                    return {
                        ownerId: match[1],
                        videoId: match[2],
                        hash: null
                    };
                }
            }
            return null;
        }

        /**
         * Конвертирует VK ссылку в формат iframe для встраивания.
         */
        function convertVKToEmbedUrl(url) {
            const vkData = extractVKId(url);
            if (!vkData || !vkData.ownerId || !vkData.videoId) return null;
            
            // Формируем URL для встраивания VK видео с автозапуском
            let embedUrl = `https://vk.com/video_ext.php?oid=${vkData.ownerId}&id=${vkData.videoId}&hd=2&autoplay=1`;
            
            // Добавляем hash если есть
            if (vkData.hash) {
                embedUrl += `&hash=${vkData.hash}`;
            }
            
            return embedUrl;
        }

        // ============================================================
        // ===== ОБРАБОТКА ФОРМЫ ЗАГРУЗКИ ВИДЕО =====
        // ============================================================

        videoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = videoUrlInput.value.trim();
            if (url) {
                loadBtn.disabled = true;
                loadBtn.textContent = 'Загрузка...';
                loadVideo(url).finally(() => {
                    loadBtn.disabled = false;
                    loadBtn.textContent = 'Загрузить';
                });
                videoUrlInput.value = '';
            }
        });

        // Автоматическая загрузка при вставке iframe кода или ссылки
        videoUrlInput.addEventListener('paste', (e) => {
            setTimeout(() => {
                const text = videoUrlInput.value.trim();
                if (text) {
                    // Если это iframe код - извлекаем URL
                    let url = text;
                    if (text.includes('<iframe')) {
                        const match = text.match(/src=["']([^"']+)["']/);
                        if (match) {
                            url = match[1];
                            videoUrlInput.value = url;
                        }
                    }
                }
            }, 100);
        });

        // ============================================================
        // ===== ЧАТ =====
        // ============================================================

        let lastMessageCount = 0;

        /**
         * Обновляет список сообщений в чате.
         */
        function updateChat(messages) {
            const isNewMessage = messages.length > lastMessageCount;
            lastMessageCount = messages.length;

            chatMessages.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');

                if (msg.system) {
                    div.className = 'msg sys';
                    div.textContent = msg.text;
                } else {
                    div.className = 'msg';
                    const time = msg.timestamp
                        ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
                        : '';
                    const userColor = generateUserColor(msg.user);
                    div.innerHTML = `
                        <span class="u" style="color: ${userColor}">${escapeHtml(msg.user)}</span>
                        <span class="t">${escapeHtml(msg.text)}</span>
                        <span class="time">${time}</span>
                    `;
                }

                chatMessages.appendChild(div);
            });

            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Если новое сообщение не от нас — звук
            if (isNewMessage && messages.length > 0) {
                const lastMsg = messages[messages.length - 1];
                if (lastMsg.user && lastMsg.user !== nickname) {
                    playReceiveSound();
                }
            }
        }

        /**
         * Добавляет системное сообщение в чат.
         */
        async function addSystemMessage(text) {
            try {
                await updateDoc(roomRef, {
                    messages: arrayUnion({
                        system: true,
                        text: text,
                        timestamp: Date.now()
                    })
                });
            } catch (error) {
                console.error('Ошибка добавления сообщения:', error);
            }
        }

        // Отправка сообщения в чат
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            playSendSound();

            try {
                await updateDoc(roomRef, {
                    messages: arrayUnion({
                        user: nickname,
                        text: text,
                        timestamp: Date.now()
                    })
                });
                chatInput.value = '';
            } catch (error) {
                console.error('Ошибка отправки сообщения:', error);
                showError('Не удалось отправить сообщение.');
            }
        });

        // ============================================================
        // ===== УПРАВЛЕНИЕ ПРИСУТСТВИЕМ =====
        // ============================================================

        /**
         * Регистрирует присутствие пользователя в комнате.
         * Использует heartbeat для отслеживания онлайна.
         */
        async function registerPresence() {
            // При входе добавляем себя
            await updateDoc(roomRef, {
                [`participants.${userId}`]: {
                    nickname: nickname,
                    lastSeen: Date.now()
                }
            });

            // Heartbeat каждые 5 секунд
            const heartbeat = setInterval(async () => {
                try {
                    await updateDoc(roomRef, {
                        [`participants.${userId}`]: {
                            nickname: nickname,
                            lastSeen: Date.now()
                        }
                    });
                } catch (error) {
                    console.error('Ошибка heartbeat:', error);
                }
            }, 5000);

            // При уходе удаляем себя
            window.addEventListener('beforeunload', async () => {
                clearInterval(heartbeat);
                try {
                    await updateDoc(roomRef, {
                        [`participants.${userId}`]: deleteField()
                    });
                } catch (error) {
                    // Игнорируем ошибки при выходе
                }
            });

            // Периодическая очистка оффлайн-участников (> 15 секунд неактивности)
            setInterval(async () => {
                try {
                    const roomSnap = await getDoc(roomRef);
                    if (roomSnap.exists()) {
                        const data = roomSnap.data();
                        const participants = data.participants || {};
                        const now = Date.now();
                        const updates = {};

                        for (const [uid, pdata] of Object.entries(participants)) {
                            if (now - pdata.lastSeen > 15000) {
                                updates[`participants.${uid}`] = deleteField();
                            }
                        }

                        if (Object.keys(updates).length > 0) {
                            await updateDoc(roomRef, updates);
                        }
                    }
                } catch (error) {
                    console.error('Ошибка очистки участников:', error);
                }
            }, 10000);
        }

        /**
         * Обновляет список участников на экране.
         */
        function updateParticipants(participants) {
            participantsList.innerHTML = '';

            const now = Date.now();
            const onlineParticipants = Object.entries(participants)
                .filter(([_, pdata]) => now - pdata.lastSeen < 15000)
                .sort((a, b) => a[1].nickname.localeCompare(b[1].nickname));

            onlineParticipants.forEach(([uid, pdata]) => {
                const div = document.createElement('div');
                div.className = 'member';
                const userColor = generateUserColor(pdata.nickname);
                div.innerHTML = `
                    <div class="member-dot"></div>
                    <span style="color: ${userColor}">${escapeHtml(pdata.nickname)}${uid === userId ? ' (Вы)' : ''}</span>
                `;
                participantsList.appendChild(div);
            });

            if (onlineParticipants.length === 0) {
                const div = document.createElement('div');
                div.className = 'member';
                div.style.color = 'var(--text-dim)';
                div.textContent = 'Нет участников';
                participantsList.appendChild(div);
            }
        }

        // ============================================================
        // ===== УТИЛИТЫ =====
        // ============================================================

        /**
         * Генерирует уникальный цвет из ника участника.
         */
        function generateUserColor(nickname) {
            // Простой hash из строки
            let hash = 0;
            for (let i = 0; i < nickname.length; i++) {
                hash = nickname.charCodeAt(i) + ((hash << 5) - hash);
            }
            
            // Генерируем HSL цвет с хорошей насыщенностью и яркостью
            const h = Math.abs(hash) % 360;
            const s = 65 + (Math.abs(hash) % 20); // 65-85%
            const l = 55 + (Math.abs(hash) % 15); // 55-70%
            
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        /**
         * Экранирует HTML-символы для безопасности.
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Показывает сообщение об ошибке.
         */
        function showError(message) {
            errorToast.textContent = message;
            errorToast.style.background = 'var(--red)';
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 4000);
        }

        function showToast(message) {
            errorToast.textContent = message;
            errorToast.style.background = 'var(--green)';
            errorToast.classList.add('show');
            setTimeout(() => {
                errorToast.classList.remove('show');
                errorToast.style.background = 'var(--red)';
            }, 2000);
        }
    </script>
