<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTogether — Комната</title>
    <!-- Plyr CSS (стили для видеоплеера) -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        /* ===== Сброс и базовые стили ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ===== Шапка с информацией о комнате ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333333;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            padding: 0.5rem 1rem;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .back-btn:hover {
            background-color: #444444;
        }

        .room-id-display {
            font-size: 1rem;
            color: #aaaaaa;
        }

        .room-id-display span {
            color: #6c63ff;
            font-weight: bold;
            cursor: pointer;
        }

        .room-id-display span:hover {
            text-decoration: underline;
        }

        .nickname-display {
            font-size: 0.9rem;
            color: #888888;
        }

        /* ===== Основной контейнер ===== */
        .main-container {
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
            gap: 1rem;
        }

        /* ===== Секция ввода видео ===== */
        .video-input-section {
            display: flex;
            gap: 0.5rem;
        }

        .video-input {
            flex: 1;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            border: 2px solid #333333;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: #ffffff;
            outline: none;
            transition: border-color 0.3s;
        }

        .video-input:focus {
            border-color: #6c63ff;
        }

        .load-btn {
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .load-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
        }

        .load-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== Плеер ===== */
        .player-wrapper {
            width: 100%;
            background-color: #000000;
            border-radius: 8px;
            overflow: hidden;
            min-height: 200px;
            position: relative;
        }

        .player-wrapper video {
            width: 100%;
            display: block;
        }

        .player-wrapper > div {
            width: 100%;
        }

        /* Plyr embed стили */
        .plyr--youtube .plyr__video-wrapper,
        .plyr--vimeo .plyr__video-wrapper {
            background: #000;
        }

        /* ===== Нижняя секция: чат + участники ===== */
        .bottom-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        /* ===== Чат ===== */
        .chat-container {
            flex: 2;
            min-width: 280px;
            background-color: #1a1a1a;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            max-height: 400px;
        }

        .chat-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #333333;
            font-weight: bold;
            color: #ffffff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* Скроллбар для чата */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #444444;
            border-radius: 3px;
        }

        .chat-message {
            padding: 0.5rem 0.75rem;
            background-color: #252525;
            border-radius: 6px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }

        .chat-message .msg-user {
            color: #6c63ff;
            font-weight: bold;
            margin-right: 0.5rem;
        }

        .chat-message .msg-text {
            color: #e0e0e0;
        }

        .chat-message .msg-time {
            color: #666666;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }

        .chat-message.system {
            background-color: #1f1f1f;
            color: #888888;
            font-style: italic;
        }

        .chat-input-form {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem;
            border-top: 1px solid #333333;
        }

        .chat-input {
            flex: 1;
            padding: 0.6rem 0.75rem;
            font-size: 0.9rem;
            border: 2px solid #333333;
            border-radius: 6px;
            background-color: #252525;
            color: #ffffff;
            outline: none;
        }

        .chat-input:focus {
            border-color: #6c63ff;
        }

        .chat-send-btn {
            padding: 0.6rem 1rem;
            background-color: #6c63ff;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .chat-send-btn:hover {
            background-color: #5a52e0;
        }

        /* ===== Список участников ===== */
        .participants-container {
            flex: 1;
            min-width: 200px;
            background-color: #1a1a1a;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            max-height: 400px;
        }

        .participants-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #333333;
            font-weight: bold;
            color: #ffffff;
        }

        .participants-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .participant {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background-color: #252525;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .participant-dot {
            width: 8px;
            height: 8px;
            background-color: #4caf50;
            border-radius: 50%;
        }

        /* ===== Уведомления об ошибках ===== */
        .error-toast {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #d32f2f;
            color: #ffffff;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 1000;
        }

        .error-toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== Адаптивность ===== */
        @media (max-width: 768px) {
            .bottom-section {
                flex-direction: column;
            }

            .chat-container,
            .participants-container {
                max-height: 300px;
            }

            .video-input-section {
                flex-direction: column;
            }

            .load-btn {
                width: 100%;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <div class="header">
        <div class="header-left">
            <button id="backBtn" class="back-btn">← На главную</button>
            <div class="room-id-display">
                Комната: <span id="roomIdDisplay" title="Нажмите, чтобы скопировать"></span>
            </div>
        </div>
        <div class="nickname-display">Вы: <span id="nicknameDisplay"></span></div>
    </div>

    <!-- Основной контент -->
    <div class="main-container">
        <!-- Ввод ссылки на видео -->
        <form id="videoForm" class="video-input-section">
            <input 
                type="text" 
                id="videoUrlInput" 
                class="video-input" 
                placeholder="Вставьте ссылку на YouTube, Vimeo или .mp4"
                required
            >
            <button type="submit" id="loadBtn" class="load-btn">Загрузить</button>
        </form>

        <!-- Плеер -->
        <div class="player-wrapper">
            <!-- Контейнер для YouTube/Vimeo через Plyr -->
            <div id="playerEmbed" style="display:none;"></div>
            <!-- HTML5 видео -->
            <video id="player" playsinline controls>
                <!-- Источник будет установлен динамически -->
            </video>
        </div>

        <!-- Чат и участники -->
        <div class="bottom-section">
            <!-- Чат -->
            <div class="chat-container">
                <div class="chat-header">💬 Чат</div>
                <div id="chatMessages" class="chat-messages"></div>
                <form id="chatForm" class="chat-input-form">
                    <input 
                        type="text" 
                        id="chatInput" 
                        class="chat-input" 
                        placeholder="Написать сообщение..."
                        maxlength="500"
                        required
                    >
                    <button type="submit" class="chat-send-btn">➤</button>
                </form>
            </div>

            <!-- Участники -->
            <div class="participants-container">
                <div class="participants-header">👥 Участники</div>
                <div id="participantsList" class="participants-list"></div>
            </div>
        </div>
    </div>

    <!-- Тост для ошибок -->
    <div id="errorToast" class="error-toast"></div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Plyr JS -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <!-- Firebase SDK (модульная версия через importmap) -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
        }
    }
    </script>

    <script type="module">
        // ============================================================
        // ===== НАСТРОЙКА FIREBASE =====
        // ============================================================

        import { initializeApp } from 'firebase/app';
        import {
            getFirestore,
            doc,
            setDoc,
            getDoc,
            onSnapshot,
            updateDoc,
            arrayUnion,
            serverTimestamp,
            deleteField
        } from 'firebase/firestore';

        // Конфигурация Firebase проекта room-4ac0b
        const firebaseConfig = {
            apiKey: "AIzaSyAPAuJUcd9_YWWvVAqiWOtlllV0An0bD18",
            authDomain: "room-4ac0b.firebaseapp.com",
            projectId: "room-4ac0b",
            storageBucket: "room-4ac0b.firebasestorage.app",
            messagingSenderId: "727563793446",
            appId: "1:727563793446:web:92b086d004d684c9f662e7",
            measurementId: "G-SPNKBKPHH1"
        };

        // Инициализация Firebase
        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            console.log('Firebase инициализирован успешно');
        } catch (e) {
            console.error('Ошибка инициализации Firebase:', e);
        }

        // ============================================================
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        // ============================================================

        // Получаем ID комнаты из URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');

        // Ник пользователя (из localStorage или "Гость")
        const nickname = localStorage.getItem('watchtogether_nickname') || 'Гость';

        // Уникальный ID пользователя для отслеживания присутствия
        const userId = Math.random().toString(36).substring(2, 10);

        // Ссылка на документ комнаты в Firestore
        const roomRef = doc(db, 'rooms', roomId);

        // Плеер Plyr
        let player = null;

        // Флаг: игнорировать следующее обновление состояния (чтобы избежать петель)
        let ignoreNextUpdate = false;

        // Время последней локальной синхронизации
        let lastSyncTime = 0;

        // Последний загруженный URL видео (для предотвращения повторной загрузки)
        let lastLoadedVideoUrl = '';

        // ============================================================
        // ===== ЭЛЕМЕНТЫ DOM =====
        // ============================================================

        const backBtn = document.getElementById('backBtn');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const videoForm = document.getElementById('videoForm');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadBtn = document.getElementById('loadBtn');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const participantsList = document.getElementById('participantsList');
        const errorToast = document.getElementById('errorToast');

        // ============================================================
        // ===== ИНИЦИАЛИЗАЦИЯ =====
        // ============================================================

        // Проверяем, что ID комнаты есть
        if (!roomId) {
            showError('ID комнаты не указан. Вернитесь на главную.');
            setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
            roomIdDisplay.textContent = roomId;
            nicknameDisplay.textContent = nickname;
            initRoom();
        }

        // Кнопка "На главную"
        backBtn.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Копирование ID комнаты по клику
        roomIdDisplay.addEventListener('click', () => {
            navigator.clipboard.writeText(roomId).then(() => {
                showToast('ID скопирован!');
            });
        });

        // ============================================================
        // ===== ИНИЦИАЛИЗАЦИЯ КОМНАТЫ =====
        // ============================================================

        async function initRoom() {
            try {
                console.log('Инициализация комнаты:', roomId);
                
                // Проверяем, существует ли комната
                const roomSnap = await getDoc(roomRef);

                if (!roomSnap.exists()) {
                    // Создаём новую комнату с дефолтными значениями
                    await setDoc(roomRef, {
                        videoUrl: '',
                        playerState: {
                            isPlaying: false,
                            currentTime: 0,
                            timestamp: Date.now()
                        },
                        messages: [],
                        participants: {},
                        createdAt: serverTimestamp()
                    });
                    console.log('Комната создана.');
                } else {
                    console.log('Комната найдена.');
                }

                // Инициализируем плеер
                initPlayer();

                // Если в комнате уже есть видео — загружаем его ДО подписки
                const roomSnap2 = await getDoc(roomRef);
                if (roomSnap2.exists()) {
                    const data = roomSnap2.data();
                    if (data.videoUrl) {
                        console.log('Загружаю существующее видео:', data.videoUrl);
                        await loadVideo(data.videoUrl, true);
                    }
                }

                // Подписываемся на обновления комнаты (после загрузки видео)
                subscribeToRoom();

                // Регистрируем присутствие
                registerPresence();

            } catch (error) {
                console.error('Ошибка инициализации:', error);
                showError('Ошибка подключения к комнате: ' + error.message);
            }
        }

        // ============================================================
        // ===== ИНИЦИАЛИЗАЦИЯ ПЛЕЕРА =====
        // ============================================================

        function initPlayer() {
            // Создаём заглушку плеера до загрузки видео
            const videoEl = document.getElementById('player');
            const embedEl = document.getElementById('playerEmbed');

            videoEl.style.display = 'block';
            embedEl.style.display = 'none';

            player = new Plyr('#player', {
                controls: [
                    'play-large', 'play', 'progress', 'current-time',
                    'duration', 'mute', 'volume', 'settings', 'fullscreen'
                ],
                settings: ['quality', 'speed'],
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
            });

            setupPlayerHandlers();

            console.log('Плеер инициализирован, ожидание видео...');
        }

        // ============================================================
        // ===== ОБНОВЛЕНИЕ СОСТОЯНИЯ В FIREBASE =====
        // ============================================================

        /**
         * Обновляет состояние плеера в Firestore.
         * @param {boolean} isPlaying - Воспроизводится ли видео
         */
        async function updatePlayerState(isPlaying) {
            if (!player) return;
            if (typeof player.duration !== 'number') return;
            try {
                await updateDoc(roomRef, {
                    playerState: {
                        isPlaying: isPlaying,
                        currentTime: player.currentTime || 0,
                        timestamp: Date.now()
                    }
                });
            } catch (error) {
                console.error('Ошибка обновления состояния:', error);
            }
        }

        // ============================================================
        // ===== ПОДПИСКА НА ОБНОВЛЕНИЯ КОМНАТЫ =====
        // ============================================================

        function subscribeToRoom() {
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) {
                    showError('Комната не найдена.');
                    return;
                }

                const data = docSnap.data();

                // Обновляем список участников
                updateParticipants(data.participants || {});

                // Обновляем сообщения чата
                updateChat(data.messages || []);

                // Синхронизируем состояние плеера
                syncPlayerState(data.playerState);

                // Обновляем видео, если URL изменился (сравниваем с lastLoadedVideoUrl)
                if (data.videoUrl && data.videoUrl !== lastLoadedVideoUrl) {
                    loadVideo(data.videoUrl, true); // fromSync = true
                }
            }, (error) => {
                console.error('Ошибка подписки:', error);
                showError('Ошибка синхронизации с комнатой.');
            });
        }

        // ============================================================
        // ===== СИНХРОНИЗАЦИЯ ПЛЕЕРА =====
        // ============================================================

        /**
         * Синхронизирует локальный плеер с состоянием из Firestore.
         * Избегает петель синхронизации.
         */
        function syncPlayerState(playerState) {
            if (!playerState || !player) return;

            const { isPlaying, currentTime, timestamp } = playerState;
            const now = Date.now();

            // Игнорируем устаревшие (>10 сек) или слишком частые события
            if (now - timestamp > 10000) return;
            if (now - lastSyncTime < 500) return;

            // Для embed-видео duration может быть ещё не определена
            if (typeof player.duration !== 'number' || player.duration <= 0) return;

            // Синхронизация времени
            const timeDiff = Math.abs(player.currentTime - currentTime);
            if (timeDiff > 1) {
                ignoreNextUpdate = true;
                player.currentTime = currentTime;
            }

            // Синхронизация play/pause
            if (isPlaying && !player.playing) {
                ignoreNextUpdate = true;
                if (typeof player.play === 'function') {
                    const result = player.play();
                    if (result && typeof result.catch === 'function') {
                        result.catch(() => {});
                    }
                }
            } else if (!isPlaying && player.playing) {
                ignoreNextUpdate = true;
                if (typeof player.pause === 'function') {
                    player.pause();
                }
            }

            lastSyncTime = now;
        }

        // ============================================================
        // ===== ЗАГРУЗКА ВИДЕО =====
        // ============================================================

        /**
         * Определяет тип видео по URL.
         * @param {string} url - Ссылка на видео
         * @returns {string} 'youtube', 'vimeo', 'mp4' или null
         */
        function detectVideoType(url) {
            if (!url) return null;
            
            // YouTube
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                return 'youtube';
            }
            
            // Vimeo
            if (url.includes('vimeo.com')) {
                return 'vimeo';
            }
            
            // Прямая ссылка на MP4
            if (url.includes('.mp4') || url.includes('.m4v')) {
                return 'mp4';
            }

            // Если ссылка не распознана, пробуем как MP4
            return 'mp4';
        }

        /**
         * Загружает видео в плеер и обновляет Firestore.
         * @param {string} url - Ссылка на видео
         * @param {boolean} fromSync - Если true, не обновлять Firestore (загрузка из подписки)
         */
        async function loadVideo(url, fromSync = false) {
            const type = detectVideoType(url);

            if (!type) {
                showError('Неподдерживаемый формат видео.');
                return;
            }

            try {
                lastLoadedVideoUrl = url;

                const videoEl = document.getElementById('player');
                const embedEl = document.getElementById('playerEmbed');

                // Уничтожаем старый Plyr
                if (player) {
                    player.destroy();
                    player = null;
                }

                if (type === 'youtube') {
                    const videoId = extractYouTubeId(url);
                    if (!videoId) {
                        showError('Неверная ссылка на YouTube.');
                        return;
                    }

                    embedEl.innerHTML = '';
                    embedEl.style.display = 'block';
                    videoEl.style.display = 'none';

                    // Создаём контейнер с правильными data-атрибутами
                    const div = document.createElement('div');
                    div.setAttribute('data-plyr-provider', 'youtube');
                    div.setAttribute('data-plyr-embed-id', videoId);
                    embedEl.appendChild(div);

                    player = new Plyr(div, {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed'],
                        youtube: {
                            noCookie: false,
                            rel: 0,
                            showinfo: 0,
                            iv_load_policy: 3,
                            modestbranding: 1
                        }
                    });

                    // Обработка ошибок YouTube
                    player.on('error', (e) => {
                        console.error('YouTube ошибка:', e);
                        showError('Видео недоступно для встраивания. Попробуйте MP4 ссылку.');
                    });

                    // Таймаут на случай, если видео не загружается
                    setTimeout(() => {
                        if (player && player.duration === 0) {
                            showError('Видео заблокировано для встраивания. Попробуйте другое или используйте MP4.');
                        }
                    }, 10000);

                } else if (type === 'vimeo') {
                    const videoId = extractVimeoId(url);
                    if (!videoId) {
                        showError('Неверная ссылка на Vimeo.');
                        return;
                    }

                    embedEl.innerHTML = '';
                    embedEl.style.display = 'block';
                    videoEl.style.display = 'none';

                    const div = document.createElement('div');
                    div.setAttribute('data-plyr-provider', 'vimeo');
                    div.setAttribute('data-plyr-embed-id', videoId);
                    embedEl.appendChild(div);

                    player = new Plyr(div, {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed']
                    });

                } else if (type === 'mp4') {
                    embedEl.style.display = 'none';
                    embedEl.innerHTML = '';
                    videoEl.style.display = 'block';

                    player = new Plyr('#player', {
                        controls: [
                            'play-large', 'play', 'progress', 'current-time',
                            'duration', 'mute', 'volume', 'settings', 'fullscreen'
                        ],
                        settings: ['quality', 'speed'],
                        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                    });

                    player.source = {
                        type: 'video',
                        sources: [{
                            src: url,
                            type: 'video/mp4'
                        }]
                    };
                }

                // Переподписываем обработчики
                setupPlayerHandlers();

                // Обновляем Firestore только если это не загрузка из подписки
                if (!fromSync) {
                    await updateDoc(roomRef, {
                        videoUrl: url,
                        playerState: {
                            isPlaying: false,
                            currentTime: 0,
                            timestamp: Date.now()
                        },
                        messages: arrayUnion({
                            system: true,
                            text: `${nickname} загрузил новое видео.`,
                            timestamp: Date.now()
                        })
                    });
                }

                console.log('Видео загружено:', url, 'тип:', type, fromSync ? '(синхронизация)' : '');

            } catch (error) {
                console.error('Ошибка загрузки видео:', error);
                if (error.code === 'unavailable') {
                    showError('Нет подключения к Firebase. Проверьте интернет.');
                } else {
                    showError('Ошибка загрузки видео: ' + error.message);
                }
            }
        }

        /**
         * Подписывает обработчики событий плеера.
         */
        function setupPlayerHandlers() {
            if (!player) return;

            player.on('play', () => {
                if (!ignoreNextUpdate) {
                    updatePlayerState(true);
                }
                ignoreNextUpdate = false;
            });

            player.on('pause', () => {
                if (!ignoreNextUpdate) {
                    updatePlayerState(false);
                }
                ignoreNextUpdate = false;
            });

            player.on('seeked', () => {
                if (!ignoreNextUpdate) {
                    updatePlayerState(player.playing);
                }
                ignoreNextUpdate = false;
            });

            player.on('error', (error) => {
                console.error('Ошибка плеера:', error);
                showError('Не удалось загрузить видео. Проверьте ссылку.');
            });

            player.on('ready', () => {
                console.log('Плеер готов');
            });

            player.on('loadedmetadata', () => {
                console.log('Метаданные видео загружены, длительность:', player.duration);
            });

            player.on('canplay', () => {
                console.log('Видео готово к воспроизведению');
            });
        }

        /**
         * Извлекает ID видео из YouTube URL.
         */
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        /**
         * Извлекает ID видео из Vimeo URL.
         */
        function extractVimeoId(url) {
            const regExp = /vimeo.com\/(\d+)/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        // ============================================================
        // ===== ОБРАБОТКА ФОРМЫ ЗАГРУЗКИ ВИДЕО =====
        // ============================================================

        videoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = videoUrlInput.value.trim();
            if (url) {
                loadBtn.disabled = true;
                loadBtn.textContent = 'Загрузка...';
                loadVideo(url).finally(() => {
                    loadBtn.disabled = false;
                    loadBtn.textContent = 'Загрузить';
                });
                videoUrlInput.value = '';
            }
        });

        // ============================================================
        // ===== ЧАТ =====
        // ============================================================

        let lastMessageCount = 0;

        /**
         * Обновляет список сообщений в чате.
         */
        function updateChat(messages) {
            // Если сообщений не стало больше, не перерисовываем
            if (messages.length <= lastMessageCount) return;
            lastMessageCount = messages.length;

            chatMessages.innerHTML = '';

            messages.forEach(msg => {
                const div = document.createElement('div');
                
                if (msg.system) {
                    div.className = 'chat-message system';
                    div.textContent = msg.text;
                } else {
                    div.className = 'chat-message';
                    const time = msg.timestamp 
                        ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
                        : '';
                    div.innerHTML = `
                        <span class="msg-user">${escapeHtml(msg.user)}:</span>
                        <span class="msg-text">${escapeHtml(msg.text)}</span>
                        <span class="msg-time">${time}</span>
                    `;
                }

                chatMessages.appendChild(div);
            });

            // Прокручиваем вниз
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        /**
         * Добавляет системное сообщение в чат.
         */
        async function addSystemMessage(text) {
            try {
                await updateDoc(roomRef, {
                    messages: arrayUnion({
                        system: true,
                        text: text,
                        timestamp: Date.now()
                    })
                });
            } catch (error) {
                console.error('Ошибка добавления сообщения:', error);
            }
        }

        // Отправка сообщения в чат
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            try {
                await updateDoc(roomRef, {
                    messages: arrayUnion({
                        user: nickname,
                        text: text,
                        timestamp: Date.now()
                    })
                });
                chatInput.value = '';
            } catch (error) {
                console.error('Ошибка отправки сообщения:', error);
                showError('Не удалось отправить сообщение.');
            }
        });

        // ============================================================
        // ===== УПРАВЛЕНИЕ ПРИСУТСТВИЕМ =====
        // ============================================================

        /**
         * Регистрирует присутствие пользователя в комнате.
         * Использует heartbeat для отслеживания онлайна.
         */
        async function registerPresence() {
            // При входе добавляем себя
            await updateDoc(roomRef, {
                [`participants.${userId}`]: {
                    nickname: nickname,
                    lastSeen: Date.now()
                }
            });

            // Heartbeat каждые 5 секунд
            const heartbeat = setInterval(async () => {
                try {
                    await updateDoc(roomRef, {
                        [`participants.${userId}`]: {
                            nickname: nickname,
                            lastSeen: Date.now()
                        }
                    });
                } catch (error) {
                    console.error('Ошибка heartbeat:', error);
                }
            }, 5000);

            // При уходе удаляем себя
            window.addEventListener('beforeunload', async () => {
                clearInterval(heartbeat);
                try {
                    await updateDoc(roomRef, {
                        [`participants.${userId}`]: deleteField()
                    });
                } catch (error) {
                    // Игнорируем ошибки при выходе
                }
            });

            // Периодическая очистка оффлайн-участников (> 15 секунд неактивности)
            setInterval(async () => {
                try {
                    const roomSnap = await getDoc(roomRef);
                    if (roomSnap.exists()) {
                        const data = roomSnap.data();
                        const participants = data.participants || {};
                        const now = Date.now();
                        const updates = {};

                        for (const [uid, pdata] of Object.entries(participants)) {
                            if (now - pdata.lastSeen > 15000) {
                                updates[`participants.${uid}`] = deleteField();
                            }
                        }

                        if (Object.keys(updates).length > 0) {
                            await updateDoc(roomRef, updates);
                        }
                    }
                } catch (error) {
                    console.error('Ошибка очистки участников:', error);
                }
            }, 10000);
        }

        /**
         * Обновляет список участников на экране.
         */
        function updateParticipants(participants) {
            participantsList.innerHTML = '';

            const now = Date.now();
            const onlineParticipants = Object.entries(participants)
                .filter(([_, pdata]) => now - pdata.lastSeen < 15000)
                .sort((a, b) => a[1].nickname.localeCompare(b[1].nickname));

            onlineParticipants.forEach(([uid, pdata]) => {
                const div = document.createElement('div');
                div.className = 'participant';
                div.innerHTML = `
                    <div class="participant-dot"></div>
                    <span>${escapeHtml(pdata.nickname)}${uid === userId ? ' (Вы)' : ''}</span>
                `;
                participantsList.appendChild(div);
            });

            if (onlineParticipants.length === 0) {
                const div = document.createElement('div');
                div.className = 'participant';
                div.style.color = '#666666';
                div.textContent = 'Нет участников';
                participantsList.appendChild(div);
            }
        }

        // ============================================================
        // ===== УТИЛИТЫ =====
        // ============================================================

        /**
         * Экранирует HTML-символы для безопасности.
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Показывает сообщение об ошибке.
         */
        function showError(message) {
            errorToast.textContent = message;
            errorToast.classList.add('visible');
            setTimeout(() => {
                errorToast.classList.remove('visible');
            }, 4000);
        }

        /**
         * Показывает информационное сообщение.
         */
        function showToast(message) {
            errorToast.textContent = message;
            errorToast.style.backgroundColor = '#4caf50';
            errorToast.classList.add('visible');
            setTimeout(() => {
                errorToast.classList.remove('visible');
                errorToast.style.backgroundColor = '#d32f2f';
            }, 2000);
        }
    </script>
</body>
</html>
