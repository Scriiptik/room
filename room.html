<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTogether — Комната</title>
    <!-- Plyr CSS только для MP4 -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-2: #1f1f23;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --text-dim: #52525b;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --green: #22c55e;
            --red: #ef4444;
            --radius: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s, color 0.2s;
        }

        .btn-icon:hover {
            background: var(--surface-2);
            color: var(--text);
        }

        .room-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .room-badge:hover {
            border-color: var(--accent);
        }

        .room-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
        }

        /* Основной контейнер */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.25rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .video-bar {
            display: flex;
            gap: 0.5rem;
        }

        .video-bar .input {
            flex: 1;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .video-bar .input::placeholder { color: var(--text-dim); }
        .video-bar .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-accent {
            padding: 0.7rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .btn-accent:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
        }

        .btn-accent:active { transform: translateY(0); }
        .btn-accent:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Плеер */
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16 / 9;
            position: relative;
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .player-wrapper video {
            width: 100%;
            height: 100%;
            display: block;
        }

        .player-wrapper > div {
            width: 100%;
            height: 100%;
        }

        .plyr { --plyr-color-main: var(--accent); height: 100%; }
        .plyr__video-wrapper { background: #000; }

        /* Нижняя секция */
        .bottom {
            display: flex;
            gap: 1rem;
            min-height: 320px;
        }

        .chat {
            flex: 1;
            min-width: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
        }

        .chat-head {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
            padding: 0.5rem 0.75rem;
            background: var(--surface-2);
            border-radius: 8px;
            font-size: 0.85rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg .u { color: var(--accent); font-weight: 600; margin-right: 0.35rem; }
        .msg .t { color: var(--text-muted); }
        .msg .time { color: var(--text-dim); font-size: 0.7rem; margin-left: 0.4rem; }

        .msg.sys {
            background: transparent;
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.8rem;
        }

        .chat-foot {
            display: flex;
            gap: 0.4rem;
            padding: 0.6rem 0.75rem;
            border-top: 1px solid var(--border);
        }

        .chat-foot .input {
            flex: 1;
            padding: 0.55rem 0.75rem;
            font-size: 0.85rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-foot .input::placeholder { color: var(--text-dim); }
        .chat-foot .input:focus { border-color: var(--accent); }

        .btn-send {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-send:hover { background: var(--accent-hover); }

        .panel {
            width: 220px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
        }

        .panel-head {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-track { background: transparent; }
        .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .member {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.6rem;
            border-radius: 8px;
            font-size: 0.82rem;
            transition: background 0.15s;
        }

        .member:hover { background: var(--surface-2); }
        .member-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--red);
            color: #fff;
            padding: 0.65rem 1.25rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .main { padding: 0.75rem 0.75rem 1.5rem; }
            .bottom { flex-direction: column; min-height: auto; }
            .panel { width: 100%; max-height: 200px; }
            .chat { min-height: 280px; }
            .video-bar { flex-direction: column; }
            .btn-accent { width: 100%; text-align: center; }
            .user-badge span { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <button id="backBtn" class="btn-icon" title="На главную">←</button>
            <div class="room-badge" id="roomIdDisplay" title="Нажмите, чтобы скопировать">
                <span class="dot"></span>
                <span id="roomIdText"></span>
            </div>
        </div>
        <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <span id="nicknameDisplay"></span>
        </div>
    </div>

    <div class="main">
        <form id="videoForm" class="video-bar">
            <input type="text" id="videoUrlInput" class="input" placeholder="YouTube, Vimeo или прямая ссылка на .mp4" required autocomplete="off">
            <button type="submit" id="loadBtn" class="btn-accent">▶ Загрузить</button>
        </form>

        <div class="player-wrapper">
            <!-- Контейнер для iframe (YouTube/Vimeo) -->
            <div id="playerEmbed" style="display:none;"></div>
            <!-- Видео для MP4 -->
            <video id="player" playsinline controls style="display:none;"></video>
        </div>

        <div class="bottom">
            <div class="chat">
                <div class="chat-head">💬 Чат</div>
                <div id="chatMessages" class="chat-body"></div>
                <form id="chatForm" class="chat-foot">
                    <input type="text" id="chatInput" class="input" placeholder="Написать сообщение..." maxlength="500" required autocomplete="off">
                    <button type="submit" class="btn-send">➤</button>
                </form>
            </div>
            <div class="panel">
                <div class="panel-head">👥 Участники</div>
                <div id="participantsList" class="panel-body"></div>
            </div>
        </div>
    </div>

    <div id="errorToast" class="toast"></div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <!-- Plyr только для MP4 -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
        }
    }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, arrayUnion, serverTimestamp, deleteField } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyAPAuJUcd9_YWWvVAqiWOtlllV0An0bD18",
            authDomain: "room-4ac0b.firebaseapp.com",
            projectId: "room-4ac0b",
            storageBucket: "room-4ac0b.firebasestorage.app",
            messagingSenderId: "727563793446",
            appId: "1:727563793446:web:92b086d004d684c9f662e7",
            measurementId: "G-SPNKBKPHH1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log('Firebase инициализирован');

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('id');
        const nickname = localStorage.getItem('watchtogether_nickname') || 'Гость';
        const userId = Math.random().toString(36).substring(2, 10);
        const roomRef = doc(db, 'rooms', roomId);

        // Плеер (может быть Plyr для MP4 или объект YouTube)
        let player = null;
        let playerType = null; // 'youtube', 'vimeo', 'mp4'
        let youtubePlayer = null; // объект YT.Player
        let ignorePlayerEvents = false; // флаг, чтобы не отправлять изменения, вызванные синхронизацией
        let lastSyncTime = 0;
        let lastLoadedVideoUrl = '';

        // Элементы DOM
        const backBtn = document.getElementById('backBtn');
        const roomIdText = document.getElementById('roomIdText');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const nicknameDisplay = document.getElementById('nicknameDisplay');
        const userAvatar = document.getElementById('userAvatar');
        const videoForm = document.getElementById('videoForm');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadBtn = document.getElementById('loadBtn');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const participantsList = document.getElementById('participantsList');
        const errorToast = document.getElementById('errorToast');

        const videoEl = document.getElementById('player');
        const embedEl = document.getElementById('playerEmbed');

        if (!roomId) {
            showError('ID комнаты не указан');
            setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
            roomIdText.textContent = roomId;
            nicknameDisplay.textContent = nickname;
            userAvatar.textContent = nickname.charAt(0).toUpperCase();
            initRoom();
        }

        backBtn.addEventListener('click', () => window.location.href = 'index.html');
        roomIdDisplay.addEventListener('click', () => {
            navigator.clipboard.writeText(roomId).then(() => showToast('ID скопирован!'));
        });

        // ========== Инициализация комнаты ==========
        async function initRoom() {
            try {
                console.log('Инициализация комнаты:', roomId);
                const roomSnap = await getDoc(roomRef);
                if (!roomSnap.exists()) {
                    await setDoc(roomRef, {
                        videoUrl: '',
                        playerState: { isPlaying: false, currentTime: 0, timestamp: Date.now() },
                        messages: [],
                        participants: {},
                        createdAt: serverTimestamp()
                    });
                    console.log('Комната создана');
                } else {
                    console.log('Комната найдена');
                }

                // Загружаем существующее видео, если есть
                const data = (await getDoc(roomRef)).data();
                if (data && data.videoUrl) {
                    await loadVideo(data.videoUrl, true);
                }

                subscribeToRoom();
                registerPresence();
            } catch (e) {
                console.error('Ошибка инициализации:', e);
                showError('Ошибка подключения к комнате');
            }
        }

        // ========== Подписка на Firestore ==========
        function subscribeToRoom() {
            onSnapshot(roomRef, (docSnap) => {
                if (!docSnap.exists()) return;
                const data = docSnap.data();
                updateParticipants(data.participants || {});
                updateChat(data.messages || []);
                syncPlayerState(data.playerState);
                if (data.videoUrl && data.videoUrl !== lastLoadedVideoUrl) {
                    loadVideo(data.videoUrl, true);
                }
            });
        }

        // ========== Синхронизация состояния ==========
        function syncPlayerState(playerState) {
            if (!playerState || !player) return;
            const { isPlaying, currentTime, timestamp } = playerState;
            const now = Date.now();
            if (now - timestamp > 8000) return;
            if (now - lastSyncTime < 1000) return;

            if (playerType === 'youtube' && youtubePlayer) {
                const playerCurrentTime = youtubePlayer.getCurrentTime();
                const playerIsPlaying = youtubePlayer.getPlayerState() === YT.PlayerState.PLAYING;
                
                // Перемотка
                if (Math.abs(playerCurrentTime - currentTime) > 1.5) {
                    ignorePlayerEvents = true;
                    youtubePlayer.seekTo(currentTime, true);
                    setTimeout(() => ignorePlayerEvents = false, 200);
                }
                // Play/Pause
                if (isPlaying && !playerIsPlaying) {
                    ignorePlayerEvents = true;
                    youtubePlayer.playVideo();
                    setTimeout(() => ignorePlayerEvents = false, 200);
                } else if (!isPlaying && playerIsPlaying) {
                    ignorePlayerEvents = true;
                    youtubePlayer.pauseVideo();
                    setTimeout(() => ignorePlayerEvents = false, 200);
                }
            } else if (playerType === 'mp4' && player) {
                if (!player.duration) return;
                const timeDiff = Math.abs(player.currentTime - currentTime);
                if (timeDiff > 1.5) {
                    ignorePlayerEvents = true;
                    player.currentTime = currentTime;
                    setTimeout(() => ignorePlayerEvents = false, 200);
                }
                if (isPlaying && !player.playing) {
                    ignorePlayerEvents = true;
                    player.play().catch(() => {});
                    setTimeout(() => ignorePlayerEvents = false, 200);
                } else if (!isPlaying && player.playing) {
                    ignorePlayerEvents = true;
                    player.pause();
                    setTimeout(() => ignorePlayerEvents = false, 200);
                }
            }
            lastSyncTime = now;
        }

        // ========== Загрузка видео ==========
        function detectVideoType(url) {
            if (!url) return null;
            if (url.includes('youtube.com') || url.includes('youtu.be')) return 'youtube';
            if (url.includes('vimeo.com')) return 'vimeo';
            if (url.includes('.mp4') || url.includes('.m4v')) return 'mp4';
            return 'mp4';
        }

        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function extractVimeoId(url) {
            const regExp = /vimeo.com\/(\d+)/;
            const match = url.match(regExp);
            return match ? match[1] : null;
        }

        async function loadVideo(url, fromSync = false) {
            const type = detectVideoType(url);
            if (!type) return showError('Неподдерживаемый формат');

            try {
                lastLoadedVideoUrl = url;
                playerType = type;

                // Уничтожаем предыдущий плеер
                if (player) {
                    if (playerType === 'mp4') player.destroy();
                    player = null;
                }
                if (youtubePlayer) {
                    youtubePlayer.destroy();
                    youtubePlayer = null;
                }

                // Скрываем всё
                videoEl.style.display = 'none';
                embedEl.style.display = 'none';
                embedEl.innerHTML = '';
                document.querySelectorAll('.plyr').forEach(el => el.style.display = 'none');

                // === YouTube ===
                if (type === 'youtube') {
                    const videoId = extractYouTubeId(url);
                    if (!videoId) throw new Error('Неверная ссылка YouTube');
                    
                    embedEl.style.display = 'block';
                    embedEl.innerHTML = `<div id="yt-player-container"></div>`;

                    // Ждём загрузки API и создаём плеер
                    if (!window.YT) {
                        // Если API ещё не загрузилось, подождём
                        await new Promise(resolve => {
                            const check = () => {
                                if (window.YT && YT.Player) resolve();
                                else setTimeout(check, 100);
                            };
                            check();
                        });
                    }

                    youtubePlayer = new YT.Player('yt-player-container', {
                        videoId: videoId,
                        playerVars: { autoplay: 0, controls: 1, modestbranding: 1, rel: 0 },
                        events: {
                            onReady: () => console.log('YouTube плеер готов'),
                            onStateChange: (event) => {
                                if (ignorePlayerEvents) return;
                                // Отправляем состояние в Firestore только при реальных действиях
                                const state = event.data;
                                if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.PAUSED) {
                                    updatePlayerStateToFirestore(state === YT.PlayerState.PLAYING);
                                }
                            }
                        }
                    });
                    player = { dummy: true }; // заглушка
                }
                // === Vimeo (упрощённо через iframe без API) ===
                else if (type === 'vimeo') {
                    const videoId = extractVimeoId(url);
                    if (!videoId) throw new Error('Неверная ссылка Vimeo');
                    embedEl.style.display = 'block';
                    embedEl.innerHTML = `<iframe src="https://player.vimeo.com/video/${videoId}?title=0&byline=0&portrait=0" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
                    player = { dummy: true };
                }
                // === MP4 (Plyr) ===
                else if (type === 'mp4') {
                    videoEl.style.display = 'block';
                    player = new Plyr('#player', {
                        controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'fullscreen'],
                        settings: ['quality', 'speed'],
                        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
                    });
                    player.source = { type: 'video', sources: [{ src: url, type: 'video/mp4' }] };
                    
                    player.on('play', () => { if (!ignorePlayerEvents) updatePlayerStateToFirestore(true); });
                    player.on('pause', () => { if (!ignorePlayerEvents) updatePlayerStateToFirestore(false); });
                    player.on('seeked', () => { if (!ignorePlayerEvents) updatePlayerStateToFirestore(player.playing); });
                }

                // Обновляем Firestore (если не синхронизация)
                if (!fromSync) {
                    await updateDoc(roomRef, {
                        videoUrl: url,
                        playerState: { isPlaying: false, currentTime: 0, timestamp: Date.now() },
                        messages: arrayUnion({ system: true, text: `${nickname} загрузил новое видео`, timestamp: Date.now() })
                    });
                }
                console.log('Видео загружено:', url, type);
            } catch (e) {
                console.error('Ошибка загрузки:', e);
                showError(e.message);
            }
        }

        // Отправка состояния в Firestore
        async function updatePlayerStateToFirestore(isPlaying) {
            if (!playerType) return;
            let currentTime = 0;
            if (playerType === 'youtube' && youtubePlayer) {
                currentTime = youtubePlayer.getCurrentTime();
            } else if (playerType === 'mp4' && player) {
                currentTime = player.currentTime;
            }
            try {
                await updateDoc(roomRef, {
                    playerState: { isPlaying, currentTime, timestamp: Date.now() }
                });
            } catch (e) {
                console.error('Ошибка обновления состояния:', e);
            }
        }

        // ========== Обработка формы ==========
        videoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const url = videoUrlInput.value.trim();
            if (!url) return;
            loadBtn.disabled = true;
            loadBtn.textContent = 'Загрузка...';
            loadVideo(url).finally(() => {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Загрузить';
            });
            videoUrlInput.value = '';
        });

        // ========== Чат ==========
        let lastMessageCount = 0;
        function updateChat(messages) {
            if (messages.length <= lastMessageCount) return;
            lastMessageCount = messages.length;
            chatMessages.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                if (msg.system) {
                    div.className = 'msg sys';
                    div.textContent = msg.text;
                } else {
                    div.className = 'msg';
                    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
                    div.innerHTML = `<span class="u">${escapeHtml(msg.user)}</span><span class="t">${escapeHtml(msg.text)}</span><span class="time">${time}</span>`;
                }
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;
            try {
                await updateDoc(roomRef, {
                    messages: arrayUnion({ user: nickname, text, timestamp: Date.now() })
                });
                chatInput.value = '';
            } catch (e) {
                showError('Не удалось отправить сообщение');
            }
        });

        // ========== Участники ==========
        async function registerPresence() {
            await updateDoc(roomRef, { [`participants.${userId}`]: { nickname, lastSeen: Date.now() } });
            const heartbeat = setInterval(async () => {
                await updateDoc(roomRef, { [`participants.${userId}.lastSeen`]: Date.now() });
            }, 5000);
            window.addEventListener('beforeunload', () => {
                clearInterval(heartbeat);
                updateDoc(roomRef, { [`participants.${userId}`]: deleteField() });
            });
        }

        function updateParticipants(participants) {
            participantsList.innerHTML = '';
            const now = Date.now();
            Object.entries(participants)
                .filter(([_, p]) => now - p.lastSeen < 15000)
                .sort((a, b) => a[1].nickname.localeCompare(b[1].nickname))
                .forEach(([uid, p]) => {
                    const div = document.createElement('div');
                    div.className = 'member';
                    div.innerHTML = `<div class="member-dot"></div><span>${escapeHtml(p.nickname)}${uid === userId ? ' (Вы)' : ''}</span>`;
                    participantsList.appendChild(div);
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showError(msg) {
            errorToast.textContent = msg;
            errorToast.style.background = 'var(--red)';
            errorToast.classList.add('show');
            setTimeout(() => errorToast.classList.remove('show'), 4000);
        }

        function showToast(msg) {
            errorToast.textContent = msg;
            errorToast.style.background = 'var(--green)';
            errorToast.classList.add('show');
            setTimeout(() => {
                errorToast.classList.remove('show');
                errorToast.style.background = 'var(--red)';
            }, 2000);
        }
    </script>
</body>
</html>
