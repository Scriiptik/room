<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTogether — Смотрим видео вместе</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-hover: #1f1f23;
            --border: #27272a;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* Фоновый градиент */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* ===== Логотип ===== */
        .logo {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.25);
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.35rem;
        }

        /* ===== Карточка ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        /* ===== Ник ===== */
        .field-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input::placeholder {
            color: #52525b;
        }

        .input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .nickname-field {
            margin-bottom: 1.5rem;
        }

        /* ===== Кнопка создать ===== */
        .btn-primary {
            width: 100%;
            padding: 0.85rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* ===== Разделитель ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ===== Форма входа ===== */
        .join-form {
            display: flex;
            gap: 0.5rem;
        }

        .join-form .input {
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            text-align: center;
        }

        .btn-secondary {
            padding: 0.75rem 1.25rem;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            color: var(--text);
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: var(--border);
            border-color: #3f3f46;
        }

        /* ===== Футер ===== */
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #3f3f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Логотип -->
        <div class="logo">
            <div class="logo-icon">▶</div>
            <h1>WatchTogether</h1>
            <p>Смотрите видео с друзьями синхронно</p>
        </div>

        <!-- Карточка -->
        <div class="card">
            <!-- Ник -->
            <div class="nickname-field">
                <div class="field-label">Ваш ник</div>
                <input
                    type="text"
                    id="nickname"
                    class="input"
                    placeholder="Гость"
                    maxlength="20"
                    autocomplete="off"
                >
            </div>

            <!-- Создать комнату -->
            <button id="createBtn" class="btn-primary">Создать комнату</button>

            <!-- Разделитель -->
            <div class="divider">
                <span>или войти в существующую</span>
            </div>

            <!-- Войти -->
            <form id="joinForm" class="join-form">
                <input
                    type="text"
                    id="roomId"
                    class="input"
                    placeholder="ABC123"
                    maxlength="6"
                    required
                    autocomplete="off"
                >
                <button type="submit" class="btn-secondary">Войти →</button>
            </form>
        </div>

        <div class="footer">WatchTogether © 2026</div>
    </div>

    <script>
        const createBtn = document.getElementById('createBtn');
        const joinForm = document.getElementById('joinForm');
        const roomIdInput = document.getElementById('roomId');
        const nicknameInput = document.getElementById('nickname');

        function generateRoomId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function saveNickname() {
            const nickname = nicknameInput.value.trim() || 'Гость';
            localStorage.setItem('watchtogether_nickname', nickname);
        }

        createBtn.addEventListener('click', () => {
            saveNickname();
            window.location.href = `room.html?id=${generateRoomId()}`;
        });

        joinForm.addEventListener('submit', (e) => {
            e.preventDefault();
            saveNickname();
            const roomId = roomIdInput.value.trim().toUpperCase();
            if (roomId.length === 6) {
                window.location.href = `room.html?id=${roomId}`;
            } else {
                alert('ID комнаты должен состоять из 6 символов.');
            }
        });

        const saved = localStorage.getItem('watchtogether_nickname');
        if (saved) nicknameInput.value = saved;
    </script>
</body>
</html>
