<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открытие VK видео...</title>
    <!-- Предотвращаем открытие в приложении -->
    <meta name="apple-itunes-app" content="no">
    <meta name="google-play-app" content="no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #09090b;
            color: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.25rem; margin-bottom: 0.75rem; }
        p { color: #a1a1aa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block; padding: 0.75rem 1.5rem;
            background: #8b5cf6; color: #fff; text-decoration: none;
            border-radius: 10px; font-weight: 600; font-size: 0.9rem;
        }
        .btn:hover { background: #7c3aed; }
        .iframe-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: none;
        }
        .iframe-container iframe {
            width: 100%; height: 100%; border: none;
        }
    </style>
</head>
<body>
    <div class="container" id="loadingUI">
        <div class="spinner"></div>
        <h1>Открываем VK видео...</h1>
        <p>Загружаем видео в браузере</p>
        <a id="openLink" class="btn" href="#" target="_blank" rel="noopener noreferrer">Открыть в браузере</a>
    </div>

    <!-- Контейнер для iframe -->
    <div class="iframe-container" id="iframeContainer">
        <iframe id="videoFrame" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
    </div>

    <script>
        // Получаем URL видео из параметров
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('url');
        
        if (videoUrl) {
            document.getElementById('openLink').href = videoUrl;
            
            // Пытаемся открыть в iframe (это предотвратит открытие в приложении)
            setTimeout(() => {
                try {
                    const iframe = document.getElementById('videoFrame');
                    iframe.src = videoUrl;
                    
                    // Показываем iframe, скрываем загрузку
                    document.getElementById('iframeContainer').style.display = 'block';
                    document.getElementById('loadingUI').style.display = 'none';
                } catch (e) {
                    // Если iframe не работает, показываем кнопку
                    console.error('Ошибка iframe:', e);
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('h1').textContent = 'Откройте видео по ссылке';
                }
            }, 500);
        } else {
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('h1').textContent = 'Ошибка';
            document.querySelector('p').textContent = 'Не указан URL видео';
            document.getElementById('openLink').style.display = 'none';
        }
    </script>
</body>
</html>
